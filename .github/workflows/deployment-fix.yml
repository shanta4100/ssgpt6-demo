name: Deployment Fix

on:
  pull_request:
    types: [review_requested, review_submitted]

permissions:
  contents: read

concurrency:
  group: deployment-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    env:
      RATE_LIMIT_MIN_REMAINING: 100
      RATE_LIMIT_PAUSE_SECONDS: 120
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run deployment script
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          FALLBACK_GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$PERSONAL_ACCESS_TOKEN" ]; then
            export GH_TOKEN="$PERSONAL_ACCESS_TOKEN"
          else
            export GH_TOKEN="$FALLBACK_GITHUB_TOKEN"
          fi

          run_with_retry() {
            local retries=3
            local attempt=1
            local backoff=15

            while [ "$attempt" -le "$retries" ]; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" -eq "$retries" ]; then
                return 1
              fi

              sleep "$backoff"
              backoff=$((backoff * 2))
              attempt=$((attempt + 1))
            done
          }

          if ! remaining="$(run_with_retry gh api /rate_limit --jq '.resources.core.remaining')"; then
            echo "Failed to check GitHub API rate limit after retries" >&2
            exit 1
          fi
          if [ "$remaining" -le "$RATE_LIMIT_MIN_REMAINING" ]; then
            echo "Rate limit below threshold ($remaining remaining), waiting ${RATE_LIMIT_PAUSE_SECONDS}s..."
            sleep "$RATE_LIMIT_PAUSE_SECONDS"

            if ! remaining="$(run_with_retry gh api /rate_limit --jq '.resources.core.remaining')"; then
              echo "Failed to re-check GitHub API rate limit after waiting" >&2
              exit 1
            fi
            if [ "$remaining" -le "$RATE_LIMIT_MIN_REMAINING" ]; then
              echo "GitHub API rate limit remains too low after waiting ($remaining remaining)" >&2
              exit 1
            fi
          fi

          npm run build --if-present
