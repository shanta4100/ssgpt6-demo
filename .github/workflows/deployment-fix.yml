name: Deployment Fix

on:
  pull_request:
    types: [review_requested]

permissions:
  contents: read

concurrency:
  group: deployment-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run deployment script
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
        run: |
          run_with_retry() {
            local retries=3
            local attempt=1
            local backoff=15

            while [ "$attempt" -le "$retries" ]; do
              if "$@"; then
                return 0
              fi

              if [ "$attempt" -eq "$retries" ]; then
                return 1
              fi

              sleep "$backoff"
              backoff=$((backoff * 2))
              attempt=$((attempt + 1))
            done
          }

          run_with_retry bash -c 'echo "Deploying with optimized token and retry handling"'
