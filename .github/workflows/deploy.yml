name: Build Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Caching is removed to prevent the "lock file not found" error

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build --if-present
